name: CD Pipeline to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest
    steps:
    - name: SSH and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # Go to project directory
          cd /var/www/connectpro-ui
          
          # Pull latest code
          git pull origin main
          
          # 1. Setup Backend
          cd backend
          npm install
          npx prisma generate
          npx prisma migrate deploy
          npm run build
          # Restart backend via PM2
          pm2 restart connectpro-backend || pm2 start dist/app.js --name connectpro-backend
          
          # 2. Setup Frontend
          cd ../frontend
          npm install
          npm run build
          # Frontend static files will be served by Nginx from the dist folder
