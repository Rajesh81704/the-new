name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: magicallysocial
          POSTGRES_USER: magicallysocial_app
          POSTGRES_PASSWORD: MagicallySocial2026
    steps:
      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgres://magicallysocial_app:MagicallySocial2026@localhost:5432/magicallysocial" >> $GITHUB_ENV
      
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            export APP_DIR=/var/www/the-new
            export BRANCH=main
            bash "$APP_DIR/scripts/deploy.sh"
